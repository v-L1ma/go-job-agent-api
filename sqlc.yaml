version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/query.sql"
    schema: "internal/database/schema.sql"
    gen:
      go:
        package: "sqlc"
        out: "./internal/queries"
        sql_package: "pgx/v5" # Use sql types provided by pgx
        emit_json_tags: true
        emit_db_tags: true # this helps pgx scan struct using types generated by sqlc